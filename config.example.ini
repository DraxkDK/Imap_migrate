# IMAP Migration Tool — example configuration
# Copy to config.ini and adjust. CLI flags override these values.
# IMPORTANT: chmod 600 config.ini  (Linux/macOS)

[source]
host = mail.old-domain.com
port = 993
# ssl = true      # use false + starttls for port 143

[target]
host = mail.new-domain.com
port = 993

[tls]
# Set to false only when testing against a self-signed cert on a private network.
verify_cert = true

[migration]
# incremental = false
# dry_run     = false
retry_count  = 3
retry_delay  = 5
timeout      = 60
batch_size   = 50

[output]
log_file       = migration.log
state_db       = migration_state.db
failed_report  = failed_items.csv
summary_report = migration_summary.csv

[folder_mapping]
# MDaemon name = iRedMail / Dovecot name
# These are applied on top of the built-in defaults.
# Sent Items   = Sent
# Deleted Items= Trash
# Junk E-mail  = Junk
